changes:
  - rscadd: "'Protector' revolver. Fires 9mm 'Murphy' with a 5 shot capacity."
  - rscadd: "'Defender' revolver. The 'Defender' is a cheaply manufactured knockoff of the 'Protector'. It fires .38 rounds while being very cheap, at a cost of doing 90% damage and a small accuracy penalty."
  - rscadd: "New revolvers to cargo. The 'Protector' is available in a 3 pack via departmental security order as well. Both are available as single pack goodies."
  - image: "Sprites for the new revolvers by Niim."