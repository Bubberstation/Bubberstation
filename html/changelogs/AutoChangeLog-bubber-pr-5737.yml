changes:
  - rscadd: "Added Plexagon NavSec, a PDA app that locates any station area by tracking its APC. No access required. Available on the NT store and pre-loaded on the assistant PDA."
  - qol: "New players and anyone dropped into an unfamiliar station layout can now find obscurely named rooms without relying on the Navigate verb or prior map knowledge."