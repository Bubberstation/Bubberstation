changes:
  - rscadd: "Added greyscale versions of some clothing to Clothesmate and loadout."
  - rscadd: "Frontier Radio Headset to loadout, along with a wider variant. It cannot accept radio keys but works as a wearable handheld radio. Woe upon thee if you have your loadout replace job items. Goodbye job headset if you do."
  - rscadd: "Ports a small selection of pants and jackets, along with a funky mantle from Nova Sector. Available in loadout."
  - rscadd: "Colonial fabricator clothing to loadout because it's nice."
  - rscadd: "New belts to loadout from Nova, using their webbing sprites. Same capacity as a fanny pack."
  - rscadd: "Blueshield clothing to loadout."
  - bugfix: "Correction's officer clothing in loadout not showing all of it due to broken datums."