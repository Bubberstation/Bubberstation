  - qol: "MKUltra now uses last fingerprints on the reagent container to assign a master. (You can make it as a synth now!)"
  - qol: "Velvet chords will automatically be given to you if someone (other then you) drinks the MKUltra you've made."
  - qol: "Borg friends can use MKUltra."
