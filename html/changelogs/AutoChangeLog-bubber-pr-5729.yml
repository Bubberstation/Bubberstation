  - qol: "Right click on the Velvet Chords action button to see a list of all commands."
  - rscdel: "Removed low purity MKUltra effects."
  - rscdel: "Removed useless commands."
  - balance: "Lows MKUltra optimal temperature to 810 from 820. There's slightly more tolerance in overheat temperature."
  - balance: "MKUltra overdose set to 50u. It causes brain damage."
  - balance: "MKUltra recipe: bluespace crystal reagent replaced with silver reagent"