author: "MrGloopy"
delete-after: True
changes:
  - rscadd: "Synth charging implant to Markings/Organs so you can choose what arm it goes in."
  - rscadd: "Various arm implanted items to Markings/Organs. These include; A seclite, four colour pen and tape recorder."
  - rscadd: "Chest implant; Internal wound analyser. Analyses your own wounds to get treatment info and make bandaging yourself faster. Does not show any other info. It's a wound analyser."
  - rscadd: "Roundstart STANDARD nutriment implant. It gets you to 35% nutrition at most, does not remove negative \"I'm Hungry!\" moodlet. You will still need to eat Actual Food. Pay your station chef."
  - rscadd: "Implanted 3 shot Donksoft gun. This is buyable from cargo. Mechanically operates like a rebar crossbow. Small chance (10%) to jam just because its funny."
  - rscadd: "New implants to cargo goodies."
  - rscadd: "Manual shield moth eyes to roundstart. Same as the other ones but moth flavoured. Same weakness to flash as normal moth eyes when shield is not in use. By virtue of them being cybernetic, they will not heal over time, same as any others."
  - rscadd: "Invisible version of the civilian HUD implant for roundstart. No more green eye if you don't want it."
  - bugfix: "Lighter implant only working for right arm. Whoops."