author: "Jinshee"
delete-after: True
changes:
  - rscadd: "Added a new quirk Psionic Dampener, affecting telepathy from quirks, genetics, slimes, xenomorphs, revenants and so on."
  - balance: "Telepathy (Quirk) no longer automatically gives the gene."
  - qol: "The telepathic communication power granted by the quirk or the genetic power is only anonymous if the caster has the mutation, not the target."
  - qol: "Telepathy (Quirk) now shows when the user uses the power and on whom, but not the contents of the message."
  - qol: "Telepathy is now multiline."